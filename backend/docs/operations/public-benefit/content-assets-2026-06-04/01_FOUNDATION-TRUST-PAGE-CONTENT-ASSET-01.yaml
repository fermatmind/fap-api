asset_id: FOUNDATION-TRUST-PAGE-CONTENT-ASSET-01
date: '2026-06-04'
publish_allowed: false
cms_draft_created: false
requires_operator_review: true
purpose: Prepare Foundation as public brand trust page without writing final public
  copy.
module_structure:
- project_identity
- independent_giving_plan
- evidence_before_amplification
- privacy_and_proof_handling
- what_this_page_does_not_claim
- future_daily_giving_ledger_relationship
operator_decisions:
  donation_start: today
  daily_amount:
    display_amount: true
    amount: 10
    currency: CNY
    frequency: daily
  recipient:
    fixed: true
    name: United Nations Foundation
    claim_boundary: Recipient only. No UN/United Nations Foundation partnership, endorsement,
      certification, authorization, or official relationship may be implied.
  public_proof_policy:
    public_proof_required_for_public_amplification: true
    withheld_allowed: true
    withheld_use: Allowed only as an approved privacy/safety exception; withheld proof
      records must not be used for trust badge or high-amplification claims.
  redaction_standard: Sensitive fields must be redacted. No redaction is allowed only
    when a receipt/proof contains no sensitive fields after reviewer inspection.
  proof_storage_strategy: Original receipt in private disk/bucket; redacted public
    proof in separate public-safe media path or signed public URL after review; admin-only
    signed URL for private proof if needed.
  daily_giving_indexability: keep noindex
  public_record_allowed: only after record exists and proof gate passes
  trust_badge: not allowed now
  social_sync: operator begins social videos/images today, but only with safe factual
    language and no trust badge/official endorsement claims
cms_fields:
  content_type: content_page
  slugs:
    zh: foundation
    en: foundation
  required:
  - title
  - summary
  - body_md
  - claim_boundary_version
  - public_benefit_policy_version
  - proof_policy_summary
  - reviewer
  - updated_at
  flags:
    is_public: true
    is_indexable: true
    schema_enabled: conditional
faq_question_inventory:
- What is FermatMind's public-benefit plan?
- Is FermatMind officially affiliated with United Nations Foundation?
- What does the daily giving record prove?
- Why is the DailyGiving ledger not fully public yet?
- What is the difference between original proof and public proof?
- Can a record be withheld?
- What information is removed from public proof?
- When can a DailyGiving record become public?
- Does the public-benefit plan change the price or report access?
- How does FermatMind prevent unsupported claims?
forbidden_claims:
- UN official partner
- officially endorsed by the UN
- certified by United Nations Foundation
- authorized fundraiser
- guaranteed impact
- nonprofit/foundation legal status unless separately documented
publish_prerequisites:
- claim boundary contract exists
- CMS fields mapped
- DailyGiving state represented as gated/noindex
- no trust badge
- operator review complete
