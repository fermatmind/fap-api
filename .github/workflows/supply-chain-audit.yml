name: supply-chain-audit

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]
  schedule:
    - cron: "17 3 * * 1"

permissions:
  contents: read

jobs:
  supply-chain-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          coverage: none
          tools: composer:v2

      - name: Prepare supply-chain evidence path
        run: |
          set -euo pipefail
          mkdir -p _audit
          printf '{"results":[]}\n' > _audit/osv-composer-lock.json

      - name: Composer validate (backend)
        working-directory: backend
        run: composer validate --strict

      - name: Composer install (backend)
        working-directory: backend
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Composer audit (backend)
        working-directory: backend
        run: |
          set -euo pipefail
          for attempt in 1 2 3; do
            if composer audit --no-interaction --ignore-unreachable; then
              exit 0
            fi
            if [ "$attempt" -lt 3 ]; then
              echo "composer audit failed (attempt ${attempt}/3), retrying in 5s..."
              sleep 5
            fi
          done
          echo "::error::composer audit failed after 3 attempts"
          exit 1

      - name: Dependency governance gate (archive + diff + severity policy)
        working-directory: backend
        run: bash scripts/pr78_verify.sh

      - name: OSV scan composer.lock
        run: |
          set -euo pipefail
          mkdir -p _audit
          docker run --rm \
            -v "${PWD}:/src" \
            -w /src \
            ghcr.io/google/osv-scanner:latest \
            scan -L /src/backend/composer.lock --format json --output /src/_audit/osv-composer-lock.json

          jq -e '.results | length == 0' _audit/osv-composer-lock.json >/dev/null || {
            echo "[FAIL] osv-scanner found vulnerabilities in backend/composer.lock"
            jq '.results' _audit/osv-composer-lock.json
            exit 1
          }

      - name: Supply chain hard gate
        run: bash scripts/supply_chain_gate.sh

      - name: Upload supply-chain evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: supply-chain-evidence
          path: |
            _audit/osv-composer-lock.json
            backend/artifacts/pr78
          if-no-files-found: error
          retention-days: 30
