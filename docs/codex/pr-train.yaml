      - php artisan test tests/Feature/Console/ArticleImportEditorialPackageCommandTest.php --no-ansi
      - php artisan test tests/Feature/Ops/ArticlePublishingOpsPageTest.php --no-ansi
      - php artisan route:list --no-ansi
