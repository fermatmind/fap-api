name: Release Train

on:
  workflow_dispatch:
    inputs:
      manifest_path:
        description: Manifest file path
        required: true
        default: ops/release-train/examples/release-train.example.json
      mode:
        description: Execution mode
        required: true
        type: choice
        default: validate
        options:
          - validate
          - plan
          - dry-run
          - run
      train_id:
        description: Optional train id override
        required: false
      allow_merge:
        description: Allow auto-merge in run mode
        required: false
        type: boolean
        default: false
      allow_deploy:
        description: Allow deploy execution in run mode
        required: false
        type: boolean
        default: false
      allow_rollback:
        description: Allow rollback execution if smoke fails
        required: false
        type: boolean
        default: false
      dry_run:
        description: Request dry-run behavior regardless of mode
        required: false
        type: boolean
        default: false

concurrency:
  group: production-release-train
  queue: max

permissions:
  contents: read
  pull-requests: read
  actions: read
  issues: write
  deployments: write

jobs:
  validate:
    name: Validate train manifest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate manifest
        env:
          RELEASE_TRAIN_MANIFEST_PATH: ${{ github.event.inputs.manifest_path }}
        run: |
          set -euo pipefail
          mkdir -p artifacts
          python3 - <<'PY'
          import os
          import pathlib

          raw = os.environ.get("RELEASE_TRAIN_MANIFEST_PATH", "")
          path = pathlib.PurePosixPath(raw)
          if (
              raw == ""
              or path.is_absolute()
              or ".." in path.parts
              or path.suffix != ".json"
              or not pathlib.Path(raw).is_file()
          ):
              raise SystemExit("invalid release train manifest path")
          PY
          python3 -m json.tool "${RELEASE_TRAIN_MANIFEST_PATH}"
          python3 ops/release-train/release_train.py validate-manifest \
            --manifest "${RELEASE_TRAIN_MANIFEST_PATH}" \
            --output artifacts/validation.json
          python3 ops/release-train/release_train.py plan \
            --manifest "${RELEASE_TRAIN_MANIFEST_PATH}" \
            --output artifacts/plan.json
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: release-train-validate
          path: |
            artifacts/validation.json
            artifacts/plan.json

  dry-run:
    name: Train dry-run
    needs: validate
    if: ${{ github.event.inputs.mode == 'dry-run' || github.event.inputs.mode == 'validate' || github.event.inputs.dry_run == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Dry-run execution
        env:
          RELEASE_TRAIN_MANIFEST_PATH: ${{ github.event.inputs.manifest_path }}
        run: |
          set -euo pipefail
          mkdir -p artifacts
          python3 - <<'PY'
          import os
          import pathlib

          raw = os.environ.get("RELEASE_TRAIN_MANIFEST_PATH", "")
          path = pathlib.PurePosixPath(raw)
          if (
              raw == ""
              or path.is_absolute()
              or ".." in path.parts
              or path.suffix != ".json"
              or not pathlib.Path(raw).is_file()
          ):
              raise SystemExit("invalid release train manifest path")
          PY
          python3 ops/release-train/release_train.py dry-run \
            --manifest "${RELEASE_TRAIN_MANIFEST_PATH}" \
            --output artifacts/dry-run.json
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: release-train-dry-run
          path: artifacts/dry-run.json

  run-train:
    name: Run release train
    needs: validate
    if: ${{ github.ref == 'refs/heads/main' && github.event.inputs.mode == 'run' && github.event.inputs.allow_deploy == 'true' && github.event.inputs.dry_run != 'true' }}
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: Execute train
        env:
          RELEASE_TRAIN_MANIFEST_PATH: ${{ github.event.inputs.manifest_path }}
          RELEASE_TRAIN_TRAIN_ID: ${{ github.event.inputs.train_id }}
          RELEASE_TRAIN_ALLOW_MERGE: ${{ github.event.inputs.allow_merge }}
          RELEASE_TRAIN_ALLOW_DEPLOY: ${{ github.event.inputs.allow_deploy }}
          RELEASE_TRAIN_ALLOW_ROLLBACK: ${{ github.event.inputs.allow_rollback }}
        run: |
          set -euo pipefail
          mkdir -p artifacts
          python3 - <<'PY'
          import os
          import pathlib

          raw = os.environ.get("RELEASE_TRAIN_MANIFEST_PATH", "")
          path = pathlib.PurePosixPath(raw)
          if (
              raw == ""
              or path.is_absolute()
              or ".." in path.parts
              or path.suffix != ".json"
              or not pathlib.Path(raw).is_file()
          ):
              raise SystemExit("invalid release train manifest path")
          PY
          python3 ops/release-train/release_train.py run \
            --manifest "${RELEASE_TRAIN_MANIFEST_PATH}" \
            --train-id "${RELEASE_TRAIN_TRAIN_ID}" \
            --allow-merge "${RELEASE_TRAIN_ALLOW_MERGE}" \
            --allow-deploy "${RELEASE_TRAIN_ALLOW_DEPLOY}" \
            --allow-rollback "${RELEASE_TRAIN_ALLOW_ROLLBACK}" \
            --output artifacts/run.json
          cat artifacts/run.json
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: release-train-run
          path: artifacts/run.json
