train_id: email-first-result-access
created_at: "2026-05-05"
continuation_protocol:
  continue_when:
    - scope_validation_green
    - local_required_validation_green
    - github_required_checks_green
    - remaining_blockers_not_introduced_by_current_pr
  external_blocker_policy:
    record_as_sidecar_issue: true
    do_not_stop_train_when_external_and_required_checks_green: true
prs:

  - id: career-runtime-publish-projection
    repo: fap-api
    branch: codex/career-runtime-publish-projection
    title: "fix(api): add career runtime publish projection authority"
    scope:
      - Add CareerRuntimePublishProjection DTO/service/exporter/validator.
      - Add export and validate artisan commands for runtime publish projection.
      - Source projection only from CareerFullReleaseLedger payloads.
      - Keep runtime state minimal: blocked, published_candidate, published, quarantined.
    do_not:
      - Change runtime API consumers.
      - Change frontend sitemap or llms consumers.
      - Change DB or import behavior.
      - Change ledger governance decisions.
    validation:
      - php artisan route:list
      - php artisan career:export-runtime-publish-projection --help
      - php artisan career:validate-runtime-publish-projection --help
      - vendor/bin/pint --test app/Domain/Career/Publish/CareerRuntimePublishProjectionDTO.php app/Domain/Career/Publish/CareerRuntimePublishProjectionService.php app/Domain/Career/Publish/CareerRuntimePublishProjectionExporter.php app/Domain/Career/Publish/CareerRuntimePublishProjectionValidator.php app/Console/Commands/CareerExportRuntimePublishProjection.php app/Console/Commands/CareerValidateRuntimePublishProjection.php tests/Unit/Services/Career/CareerRuntimePublishProjectionServiceTest.php tests/Feature/Console/CareerRuntimePublishProjectionCommandTest.php
      - php artisan test tests/Unit/Services/Career/CareerRuntimePublishProjectionServiceTest.php
      - php artisan test tests/Feature/Console/CareerRuntimePublishProjectionCommandTest.php
    merge_policy:
      github_checks_required: true
      squash: true
  - id: career-runtime-surface-projection-consumers
    repo: fap-api
    depends_on:
      - career-runtime-publish-projection
    branch: codex/career-runtime-surface-projection-consumers
    title: "fix(api): unify career runtime surfaces with publish projection"
    scope:
      - Add a Career runtime publish projection visibility lookup.
      - Make Career job dataset/list/search/detail/family hub surfaces consume projection visibility.
      - Fail closed for software-developers, CN proxy, broad group, duplicate, and governed non-public rows when projection visibility is false.
      - Preserve the existing CareerFullReleaseLedger as the source authority.
    do_not:
      - Change ledger governance decisions.
      - Change display imports, authority force, sitemap, llms, or frontend behavior.
      - Add a second Career publish authority or frontend fallback.
      - Hardcode the governed hold slugs as one-off deny lists.
    validation:
      - php artisan list | grep -i runtime-publish
      - php artisan route:list | grep -i career
      - vendor/bin/pint --test <scoped Career runtime surface files>
      - php artisan test tests/Unit/Services/Career/CareerRuntimePublishProjectionLookupTest.php tests/Unit/Services/Career/CareerJobListBundleBuilderTest.php tests/Unit/Services/Career/CareerSearchBundleBuilderTest.php
      - php artisan test tests/Unit/Services/Career/CareerJobDetailBundleBuilderTest.php tests/Unit/Services/Career/CareerFamilyHubBundleBuilderTest.php tests/Unit/Services/Career/CareerFullDatasetAuthorityBuilderTest.php
      - php artisan test tests/Unit/Services/Career/CareerRuntimePublishProjectionServiceTest.php tests/Feature/Console/CareerRuntimePublishProjectionCommandTest.php
      - php artisan test tests/Unit/Services/Career/CareerFullReleaseLedgerServiceTest.php tests/Feature/Console/CareerExportFullReleaseLedgerCommandTest.php
      - git diff --check
    merge_policy:
      github_checks_required: true
      squash: true
