  - id: PR-CMS-03
    repo: fap-api
    depends_on:
      - PR-CMS-01
      - PR-CMS-02
    branch: codex/pr-cms-03-article-publishing-ops
    title: "PR-CMS-03｜Article Publishing Ops Queue + Daily SEO Dashboard"
    scope:
      - Add article editorial package import/gate result persistence for operational visibility.
      - Add an fap-api Filament Ops page for Article Publishing Ops Queue and Daily SEO Health.
      - Surface draft/review/blocked/publish-ready/release-failed/review-due queues from backend content authority.
      - Keep dashboard read-only and limited to Article, Revision, SEO Meta, import validation, release audit, and review status.
    do_not:
      - Change existing published article content or metadata.
      - Re-import or publish articles.
      - Touch fap-web.
      - Touch user attempts, results, reports, orders, payments, shares, scoring, result pages, payment, or invite flows.
      - Add GSC, Baidu, revenue-per-cluster, video pipeline, or a new SEO intelligence stack.
